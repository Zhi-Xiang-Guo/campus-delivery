services:
  mysql:
    image: mysql:5.7
    container_name: sky-mysql
    environment:
      MYSQL_ROOT_PASSWORD: qq123456
      MYSQL_DATABASE: sky_take_out
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 仅首次初始化数据卷时会执行导入
      - ./sql/sky.sql:/docker-entrypoint-initdb.d/sky.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
    networks:
      - sky-take-out

  redis-master:
    image: redis:latest
    container_name: sky-redis-master
    hostname: redis-master
    ports:
      - "6379:6379"
    volumes:
      - redis_master_data:/data
      - ./docker/redis/redis-master.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server","/usr/local/etc/redis/redis.conf"]
    networks:
      - sky-take-out

  redis-slave-1:
    image: redis:latest
    container_name: sky-redis-slave-1
    depends_on:
      - redis-master
    volumes:
      - redis_slave1_data:/data
      - ./docker/redis/redis-slave.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server","/usr/local/etc/redis/redis.conf"]
    networks:
      - sky-take-out

  redis-slave-2:
    image: redis:latest
    container_name: sky-redis-slave-2
    depends_on:
      - redis-master
    volumes:
      - redis_slave2_data:/data
      - ./docker/redis/redis-slave.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server","/usr/local/etc/redis/redis.conf"]
    networks:
      - sky-take-out

  redis-sentinel-1:
    image: redis:latest
    container_name: sky-redis-sentinel-1
    depends_on:
      - redis-master
      - redis-slave-1
      - redis-slave-2
    ports:
      - "26379:26379"
    environment:
      - SKIP_FIX_PERMS=1
    volumes:
      - ./docker/redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    command: ["redis-server","/usr/local/etc/redis/sentinel.conf","--sentinel"]
    networks:
      - sky-take-out

  redis-sentinel-2:
    image: redis:latest
    container_name: sky-redis-sentinel-2
    depends_on:
      - redis-master
      - redis-slave-1
      - redis-slave-2
    ports:
      - "26380:26379"
    environment:
      - SKIP_FIX_PERMS=1
    volumes:
      - ./docker/redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    command: ["redis-server","/usr/local/etc/redis/sentinel.conf","--sentinel"]
    networks:
      - sky-take-out

  redis-sentinel-3:
    image: redis:latest
    container_name: sky-redis-sentinel-3
    depends_on:
      - redis-master
      - redis-slave-1
      - redis-slave-2
    ports:
      - "26381:26379"
    environment:
      - SKIP_FIX_PERMS=1
    volumes:
      - ./docker/redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    command: ["redis-server","/usr/local/etc/redis/sentinel.conf","--sentinel"]
    networks:
      - sky-take-out

  nginx:
    image: nginx:latest
    container_name: sky-nginx
    depends_on:
      - mysql
      - redis-master
      - sky-server
    ports:
      - "80:80"
    volumes:
      # 管理端静态资源
      - ./admin-client/nginx-1.20.2/html:/usr/share/nginx/html:ro
      # Docker 专用 nginx 配置（反代到宿主机 8080）
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - sky-take-out

  sky-server:
    build:
      context: .
      dockerfile: sky-server/Dockerfile
    container_name: sky-server
    depends_on:
      - mysql
      - redis-master
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - SKY_DATASOURCE_HOST=sky-mysql
      - SKY_REDIS_HOST=redis-master
    volumes:
      # 持久化存储菜品图片
      - ./sky-server/images:/app/sky-server/images
    networks:
      - sky-take-out

volumes:
  mysql_data:
  redis_master_data:
  redis_slave1_data:
  redis_slave2_data:

networks:
  sky-take-out:
    name: sky-take-out

